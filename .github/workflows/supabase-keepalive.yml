name: Supabase keep-alive

# Free-tier Supabase projects auto-pause after 7 days with no API activity.
# This pings the project every 3 days so it never goes quiet long enough
# to trigger that, without needing a paid plan.
on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf \
            "${{ secrets.SUPABASE_URL }}/rest/v1/courses?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
